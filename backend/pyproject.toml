[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.109.0",
    "huggingface-hub>=1.5.0",
    "mlx-embeddings>=0.0.5",
    "openai>=1.12.0",
    "pydantic>=2.5.0",
    "pypdf>=4.0.0",
    "python-dotenv>=1.0.0",
    "python-multipart>=0.0.6",
    "pyyaml>=6.0",
    "qdrant-client>=1.7.0",
    "sqlmodel>=0.0.37",
    "tqdm>=4.66.0",
    "types-pyyaml>=6.0",
    "uvicorn[standard]>=0.27.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pylint>=4.0.5",
    "types-pyyaml>=6.0",
]

[tool.mypy]
plugins = ['pydantic.mypy']
strict = true

[[tool.mypy.overrides]]
module = ["mlx_embeddings.*"]
follow_untyped_imports = true
